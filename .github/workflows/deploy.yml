name: Deploy to Vercel & Sync Database

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --prod --token ${{ secrets.VERCEL_TOKEN }}

      - name: Migrate Database on Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Install PostgreSQL client
          sudo apt-get install -y postgresql-client
          
          # Run migrations (if any new ones exist)
          # psql "${{ secrets.DATABASE_URL }}" -f database/schema.sql

      - name: Sync Google Sheets
        env:
          GOOGLE_SHEETS_URL: ${{ secrets.GOOGLE_SHEETS_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m pip install -r requirements.txt
          python sync_sheets.py

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify deployment status
        run: echo "Deployment complete! Check Vercel dashboard."
